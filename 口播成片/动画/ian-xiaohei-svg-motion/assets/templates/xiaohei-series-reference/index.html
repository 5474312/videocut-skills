<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">

<title>小黑 SVG 动效系列参考</title>
<link rel="icon" href="data:,">
<style>
:root {
  color-scheme: light;
  --page: #f6f4ef;
  --paper: #fff;
  --ink: #171717;
  --muted: #6d6860;
  --line: #e5ded2;
  --red: #d63a30;
  --blue: #386fc2;
  --orange: #ef6b1f;
  --green: #178358;
}
* { box-sizing: border-box; }
html,
body {
  margin: 0;
  min-height: 100%;
  background: var(--page);
  color: var(--ink);
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Sans SC", "Segoe UI", sans-serif;
}
main {
  max-width: 1480px;
  margin: 0 auto;
  padding: 22px;
}
.topbar {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 16px;
  margin-bottom: 16px;
}
h1 {
  margin: 0 0 5px;
  font-size: 24px;
  line-height: 32px;
  font-weight: 780;
}
.note {
  margin: 0;
  color: var(--muted);
  font-size: 13px;
  line-height: 20px;
}
.controls {
  display: flex;
  gap: 8px;
}
button {
  min-height: 34px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: #fffaf2;
  padding: 0 12px;
  color: var(--ink);
  font: inherit;
  font-size: 13px;
  cursor: pointer;
}
button.active,
button:hover {
  border-color: var(--orange);
  color: #9d3b08;
}
.grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 14px;
}
.card {
  overflow: hidden;
  border: 1px solid var(--line);
  border-radius: 10px;
  background: var(--paper);
}
.card-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  min-height: 50px;
  padding: 9px 12px;
  border-bottom: 1px solid var(--line);
}
.card-title {
  font-size: 14px;
  line-height: 20px;
  font-weight: 760;
}
.card-meta {
  color: var(--muted);
  font-size: 11px;
  line-height: 16px;
}
.chip {
  flex: 0 0 auto;
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 3px 9px;
  color: var(--muted);
  font: 700 11px/16px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
}
svg {
  display: block;
  width: 100%;
  aspect-ratio: 16 / 9;
  background: #fff;
}
.line {
  fill: none;
  stroke: var(--ink);
  stroke-width: 3;
  stroke-linecap: round;
  stroke-linejoin: round;
  vector-effect: non-scaling-stroke;
}
.thin { stroke-width: 2; }
.heavy { stroke-width: 4; }
.soft { stroke: rgba(23, 23, 23, .52); }
.red { stroke: var(--red); }
.blue { stroke: var(--blue); }
.orange { stroke: var(--orange); }
.green { stroke: var(--green); }
.fill-white { fill: #fff; }
.fill-black { fill: #050505; }
.fill-soft { fill: #fffdf8; }
.fill-good { fill: #eafff2; }
.fill-warn { fill: #fff1ed; }
.paper {
  fill: #fff;
  stroke: var(--ink);
  stroke-width: 2;
  stroke-linejoin: round;
  vector-effect: non-scaling-stroke;
}
.hand-text {
  font-family: "Kaiti SC", "STKaiti", "PingFang SC", sans-serif;
  font-weight: 700;
  letter-spacing: 0;
}
.text-red { fill: var(--red); }
.text-blue { fill: var(--blue); }
.text-orange { fill: var(--orange); }
.text-ink { fill: var(--ink); }
.small { font-size: 22px; }
.medium { font-size: 28px; }
.draw {
  stroke-dasharray: var(--len, 1);
  stroke-dashoffset: var(--len, 1);
}
.motion-layer {
  transform-box: fill-box;
  transform-origin: center;
}
@media (max-width: 980px) {
  .grid { grid-template-columns: 1fr; }
}
@media (max-width: 760px) {
  main { padding: 14px; }
  .topbar { align-items: flex-start; flex-direction: column; }
}
</style>
</head>

<script src="vendor/gsap.min.js"></script>
<script>
const timelines = [];

function prepDraws(root = document) {
  root.querySelectorAll('.draw').forEach(path => {
    const len = path.getTotalLength();
    path.style.setProperty('--len', len);
    path.style.strokeDashoffset = len;
  });
}

function reveal(tl, group, at) {
  tl.to(group, { opacity: 1, duration: .1 }, at)
    .fromTo(`${group} .draw`, {
      strokeDashoffset: (i, target) => target.getTotalLength()
    }, {
      strokeDashoffset: 0,
      duration: .35,
      stagger: .05
    }, at + .04)
    .from(`${group} text`, { opacity: 0, y: 8, duration: .2, stagger: .04 }, at + .02);
}

function makeTimeline() {
  const tl = gsap.timeline({ repeat: -1, repeatDelay: .9, defaults: { ease: 'power2.out' } });
  timelines.push(tl);
  return tl;
}

function setupStuck() {
  gsap.set(['#a-ann-before', '#a-ann-stuck', '#a-ann-clear'], { opacity: 0 });
  gsap.set('#a-output', { x: 650, y: 416, opacity: 0, transformOrigin: '50% 50%' });
  const tl = makeTimeline();
  tl.addLabel('context', 0)
    .from('#scene-stuck #a-belt, #scene-stuck #a-gate', { opacity: 0, y: 16, duration: .4 }, 0)
    .from('#a-xiaohei', { opacity: 0, scale: .9, y: 14, duration: .4 }, .12)
    .from('#a-inputs', { opacity: 0, x: -90, duration: .42 }, .28)
    .addLabel('input', .72)
    .to('#a-inputs', { x: 210, duration: 1.1, ease: 'none' }, .72)
    .to('#scene-stuck .a-roller', { rotation: 250, transformOrigin: '50% 50%', duration: 1.1, ease: 'none' }, .72)
    .addLabel('break', 1.68)
    .to('#a-gate', { x: -10, duration: .12, yoyo: true, repeat: 5 }, 1.68)
    .to('#a-xiaohei', { y: -8, duration: .24, yoyo: true, repeat: 1 }, 1.72)
    .addLabel('clear', 2.55)
    .to('#a-output', { opacity: 1, duration: .18 }, 2.55)
    .to('#a-output', { x: 880, duration: .9, ease: 'none' }, 2.75)
    .to('#a-gate', { x: 28, duration: .38 }, 2.72);
  reveal(tl, '#a-ann-before', .48);
  reveal(tl, '#a-ann-stuck', 1.85);
  reveal(tl, '#a-ann-clear', 2.72);
}

function setupFilter() {
  gsap.set(['#b-ann-in', '#b-ann-filter', '#b-ann-out'], { opacity: 0 });
  gsap.set('.b-paper', {
    x: i => [160, 230, 300, 370][i],
    y: i => [120, 155, 112, 165][i],
    rotation: i => [-10, 12, 8, -14][i],
    transformOrigin: '50% 50%',
    opacity: 0
  });
  gsap.set('#b-kept', { x: 628, y: 470, opacity: 0, transformOrigin: '50% 50%' });
  gsap.set('#b-trash', { opacity: 0 });
  const tl = makeTimeline();
  tl.addLabel('context', 0)
    .from('#b-funnel', { opacity: 0, y: 18, duration: .4 }, 0)
    .from('#b-xiaohei', { opacity: 0, scale: .9, y: 12, duration: .4 }, .12)
    .to('.b-paper', { opacity: 1, duration: .18, stagger: .05 }, .28)
    .addLabel('input', .62)
    .to('.b-paper', {
      x: i => [430, 505, 585, 660][i],
      y: i => [202, 210, 200, 214][i],
      rotation: i => [2, -8, 9, -4][i],
      duration: .9,
      stagger: .05
    }, .62)
    .addLabel('filter', 1.55)
    .to('#b-xiaohei', { rotation: -4, duration: .2, yoyo: true, repeat: 3 }, 1.55)
    .to('.b-paper', {
      x: i => [520, 612, 805, 850][i],
      y: i => [438, 472, 505, 532][i],
      rotation: i => [-12, 10, 25, -18][i],
      duration: .75,
      stagger: .03
    }, 1.72)
    .to('#b-trash', { opacity: 1, duration: .18 }, 1.82)
    .addLabel('out', 2.55)
    .to('#b-kept', { opacity: 1, duration: .18 }, 2.55)
    .to('#b-kept', { x: 800, y: 430, duration: .65, ease: 'none' }, 2.78);
  reveal(tl, '#b-ann-in', .45);
  reveal(tl, '#b-ann-filter', 1.48);
  reveal(tl, '#b-ann-out', 2.65);
}

function setupBridge() {
  gsap.set(['#c-ann-gap', '#c-ann-build', '#c-ann-pass'], { opacity: 0 });
  gsap.set('#c-bridge', { x: 470, y: 468, scaleX: .05, opacity: 0, transformOrigin: '0% 50%' });
  gsap.set('#c-card', { x: 255, y: 374, opacity: 0, transformOrigin: '50% 50%' });
  const tl = makeTimeline();
  tl.addLabel('context', 0)
    .from('#c-left, #c-right', { opacity: 0, y: 18, duration: .4, stagger: .08 }, 0)
    .from('#c-gap', { opacity: 0, scale: .9, duration: .3 }, .28)
    .from('#c-xiaohei', { opacity: 0, scale: .9, y: 12, duration: .4 }, .36)
    .addLabel('build', 1.1)
    .to('#c-xiaohei', { y: -8, duration: .22, yoyo: true, repeat: 2 }, 1.1)
    .to('#c-bridge', { opacity: 1, scaleX: 1, duration: .78, ease: 'power2.out' }, 1.22)
    .addLabel('pass', 2.18)
    .to('#c-card', { opacity: 1, duration: .18 }, 2.18)
    .to('#c-card', { x: 840, y: 426, rotation: 4, duration: 1.05, ease: 'none' }, 2.38);
  reveal(tl, '#c-ann-gap', .68);
  reveal(tl, '#c-ann-build', 1.25);
  reveal(tl, '#c-ann-pass', 2.7);
}

function setupLoop() {
  gsap.set(['#d-ann-check', '#d-ann-back', '#d-ann-out'], { opacity: 0 });
  gsap.set('#d-card', { x: 198, y: 406, opacity: 0, transformOrigin: '50% 50%' });
  gsap.set('#d-stamp', { x: 912, y: 506, opacity: 0, rotation: -4, transformOrigin: '50% 50%' });
  gsap.set('#d-loop-draw', { strokeDashoffset: () => document.getElementById('d-loop-draw').getTotalLength() });
  const tl = makeTimeline();
  tl.addLabel('context', 0)
    .from('#d-machines', { opacity: 0, y: 18, duration: .45 }, 0)
    .from('#d-xiaohei', { opacity: 0, scale: .9, y: 12, duration: .4 }, .18)
    .addLabel('check', .72)
    .to('#d-card', { opacity: 1, duration: .15 }, .72)
    .to('#d-card', { x: 560, y: 398, rotation: -3, duration: .9, ease: 'none' }, .9)
    .addLabel('back', 1.75)
    .to('#d-loop-draw', { strokeDashoffset: 0, duration: .72 }, 1.75)
    .to('#d-card', { x: 236, y: 352, rotation: -10, duration: .72, ease: 'power1.inOut' }, 1.82)
    .addLabel('out', 2.75)
    .to('#d-card', { x: 910, y: 404, rotation: 2, duration: .95, ease: 'none' }, 2.75)
    .to('#d-stamp', { opacity: 1, scale: 1.08, duration: .18, yoyo: true, repeat: 1 }, 3.5)
    .to('#d-xiaohei', { rotation: 4, duration: .18, yoyo: true, repeat: 3 }, 3.42);
  reveal(tl, '#d-ann-check', .75);
  reveal(tl, '#d-ann-back', 1.78);
  reveal(tl, '#d-ann-out', 2.9);
}

function setStatic() {
  timelines.forEach(tl => {
    tl.repeat(0);
    tl.progress(1).pause();
  });
  document.getElementById('play').classList.remove('active');
  document.getElementById('static').classList.add('active');
}

function setMidFrame() {
  const midTimes = [2.05, 1.9, 1.85, 2.05];
  timelines.forEach((tl, index) => {
    tl.repeat(0);
    tl.time(midTimes[index]).pause();
  });
  document.getElementById('play').classList.remove('active');
  document.getElementById('static').classList.remove('active');
}

prepDraws();
setupStuck();
setupFilter();
setupBridge();
setupLoop();

document.getElementById('play').addEventListener('click', () => {
  timelines.forEach(tl => tl.repeat(-1).restart());
  document.getElementById('play').classList.add('active');
  document.getElementById('static').classList.remove('active');
});
document.getElementById('pause').addEventListener('click', () => {
  timelines.forEach(tl => tl.pause());
  document.getElementById('play').classList.remove('active');
});
document.getElementById('static').addEventListener('click', setStatic);
window.xiaoheiSeries = { timelines, setStatic, setMidFrame };
const initialReviewMode = window.location.search.includes('frame=mid')
  ? 'mid'
  : window.location.search.includes('static') ? 'static' : '';
function applyInitialReviewMode() {
  if (initialReviewMode === 'mid') setMidFrame();
  if (initialReviewMode === 'static') setStatic();
}
if (initialReviewMode) {
  applyInitialReviewMode();
  requestAnimationFrame(applyInitialReviewMode);
  window.addEventListener('load', applyInitialReviewMode, { once: true });
  setTimeout(applyInitialReviewMode, 50);
  setTimeout(applyInitialReviewMode, 250);
}
</script>
</body>
</html>
